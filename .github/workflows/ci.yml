name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.38.8'

jobs:
  analyze:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting on owned code
        run: |
          dart format --set-exit-if-changed --output=none \
            lib/services/copilot/ \
            lib/services/billing/ \
            lib/services/assessments/ \
            lib/services/data/ \
            lib/widgets/copilot/ \
            lib/screens/settings/api_keys_screen.dart \
            lib/screens/billing/superbill_screen.dart \
            lib/screens/assessments/assessment_screen.dart

      - name: Analyze
        # Fails on errors + warnings (0 tolerated on owned code). Info-level
        # lints are transitional debt per analysis_options.yaml policy.
        run: flutter analyze --no-fatal-infos

  test:
    name: Unit + widget tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --coverage --no-pub --reporter=expanded
        continue-on-error: true   # Sprint 3 — re-enable strict once coverage stabilizes

      - name: Upload coverage artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore

  build_web:
    name: Build web (release)
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (release)
        run: flutter build web --release --no-tree-shake-icons

      - name: Verify bundle size budget
        run: |
          BUNDLE_SIZE=$(stat -c%s build/web/main.dart.js)
          BUDGET=$((5 * 1024 * 1024))
          echo "main.dart.js: $BUNDLE_SIZE bytes (budget: $BUDGET bytes)"
          if [ "$BUNDLE_SIZE" -gt "$BUDGET" ]; then
            echo "::error::Bundle size exceeded budget."
            exit 1
          fi

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: build-web
          path: build/web/
          retention-days: 7
