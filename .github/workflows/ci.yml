name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.38.8'

jobs:
  analyze:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting (whole tree)
        # Audit 2026-06-21 / CI item 8 close: the previous list of 8
        # paths covered ~7% of lib/ and let formatter drift accumulate
        # on the other 93%. After the 2026-06-22 sweep we now enforce
        # `dart format` on the full lib/ + test/ surface so PRs cannot
        # reintroduce drift.
        run: dart format --set-exit-if-changed --output=none lib/ test/

      - name: Analyze
        # Fails on errors + warnings (0 tolerated on owned code). Info-level
        # lints are transitional debt per analysis_options.yaml policy.
        run: flutter analyze --no-fatal-infos

  test:
    name: Unit + widget tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        # Sprint 29 D-01: strict — red tests fail the build.
        run: flutter test --coverage --no-pub --reporter=expanded

      - name: Upload coverage artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore

  build_web:
    name: Build web (release)
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (release)
        run: flutter build web --release --no-tree-shake-icons

      - name: Verify bundle size budget
        run: |
          BUNDLE_SIZE=$(stat -c%s build/web/main.dart.js)
          # 6 MB temporary ceiling for sprint-26 backlog (WebAuthn, PWA shell,
          # iOS Hand-off, RAG console). Sprint 27 bundle-split + tree-shake
          # chore targets 5 MB; tighten this back down once that ships.
          BUDGET=$((6 * 1024 * 1024))
          echo "main.dart.js: $BUNDLE_SIZE bytes (budget: $BUDGET bytes)"
          if [ "$BUNDLE_SIZE" -gt "$BUDGET" ]; then
            echo "::error::Bundle size exceeded budget."
            exit 1
          fi

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: build-web
          path: build/web/
          retention-days: 7

  # Audit 2026-06-21: functions/ has 127 jest tests + TS strict build but
  # was never executed in CI. Stripe webhook, PHI relay, WebAuthn, and
  # account-deletion purge all live here — PRs MUST run them.
  functions:
    name: Cloud Functions (lint + build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install
        working-directory: functions
        run: npm ci

      # Audit 2026-06-21 / CI item 4: form-data CVSS 7.5 was patched by
      # `npm audit fix` but there was no gate to prevent the next high
      # CVE from sliding in. We scope to `--omit=dev` because the dev
      # deps (eslint plugins, ts-jest helpers) carry transitive
      # moderate findings that do not ship to production and tracking
      # them here would just create noise; `--audit-level=high` keeps
      # the gate tight on the surface that actually runs.
      - name: npm audit (high severity, prod deps)
        working-directory: functions
        run: npm audit --omit=dev --audit-level=high

      - name: Lint (tsc --noEmit)
        working-directory: functions
        run: npm run lint

      - name: Build
        working-directory: functions
        run: npm run build

      - name: Test
        working-directory: functions
        run: npm test -- --ci --reporters=default

  # Audit 2026-06-21: secret-scan was missing — no protection against
  # committed API keys / private keys. Runs full-history on push,
  # PR-diff-only on PRs to keep latency low.
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
