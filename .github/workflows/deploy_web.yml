name: Deploy Web

on:
  # Manual only — this targets a VPS over SSH and needs SSH_HOST / SSH_USER /
  # SSH_KEY secrets. The public demo is published by pages.yml instead, so this
  # no longer runs (and fails) on every push.
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Flutter Pub Get
        run: flutter pub get

      # Sprint 29 D-03 — Firestore security rules deploy from same source of
      # truth as the web bundle. Prevents drift between web release and
      # access-control posture (audit_logs, cross-tenant, beta_signups).
      - name: Deploy Firestore rules
        uses: w9jds/firebase-action@v13.10.2
        with:
          args: deploy --only firestore:rules --project psyclinicai
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Build Web (Landing)
        run: flutter build web -t lib/web_main.dart --release

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "build/web/*"
          target: "~/psyclinicai_web/"

      - name: Restart Caddy Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/psyclinicai/deployment
            docker compose up -d psyclinicai-web

      # Sprint 32 — Sentry release tracking. Tags the deploy commit with
      # a release id so crashes after this run are blamed on the right
      # build. No-op without SENTRY_AUTH_TOKEN, so the workflow stays
      # green ahead of the vendor unlock (see vendor-unlocks.md §10).
      - name: Sentry release
        if: ${{ secrets.SENTRY_AUTH_TOKEN != '' }}
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: psyclinicai
          SENTRY_PROJECT: psyclinicai-flutter-web
        with:
          environment: production
          version: ${{ github.sha }}
          sourcemaps: build/web




