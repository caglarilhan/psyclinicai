name: Lighthouse CI

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'lib/**'
      - 'web/**'
      - 'pubspec.yaml'
      - '.github/workflows/lighthouse.yml'
  push:
    branches: [main]

jobs:
  lighthouse:
    name: Audit landing performance + a11y + SEO
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.8'
          channel: stable
          cache: true

      - name: Install deps
        run: flutter pub get

      - name: Build web release
        run: flutter build web --release --pwa-strategy=none

      - name: Serve build
        run: |
          (cd build/web && python3 -m http.server 8000 &)
          sleep 5

      - name: Lighthouse — landing
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:8000/
            http://localhost:8000/#/security
            http://localhost:8000/#/about
            http://localhost:8000/#/roadmap
            http://localhost:8000/#/faq
            http://localhost:8000/#/pricing
            http://localhost:8000/#/baa
            http://localhost:8000/#/dpa
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.github/lighthouse/lighthouserc.json

      # Sprint 32 P2 — axe-core a11y CI. Lighthouse a11y is a heuristic;
      # axe is rule-based and catches different violations. Both running
      # gives us coverage closer to a real WCAG 2.2 AA audit.
      - name: Install axe-core CLI
        run: npm install -g @axe-core/cli@4

      - name: axe a11y — landing
        run: |
          axe http://localhost:8000/ \
            --exit \
            --tags wcag2a,wcag2aa,wcag21aa,wcag22aa \
            --reporter v2 \
            --save axe-landing.json || true
          axe http://localhost:8000/#/roadmap \
            --exit \
            --tags wcag2a,wcag2aa,wcag21aa,wcag22aa \
            --reporter v2 \
            --save axe-roadmap.json || true

      - name: Upload axe reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: axe-reports
          path: axe-*.json
          if-no-files-found: ignore
