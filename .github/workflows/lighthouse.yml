name: Lighthouse CI

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'lib/**'
      - 'web/**'
      - 'pubspec.yaml'
      - '.github/workflows/lighthouse.yml'
  push:
    branches: [main]

jobs:
  lighthouse:
    name: Audit landing performance + a11y + SEO
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.8'
          channel: stable
          cache: true

      - name: Install deps
        run: flutter pub get

      - name: Build web release
        run: flutter build web --release --pwa-strategy=none

      - name: Serve build
        run: |
          (cd build/web && python3 -m http.server 8000 &)
          sleep 5

      - name: Lighthouse — landing
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:8000/
            http://localhost:8000/#/security
            http://localhost:8000/#/about
            http://localhost:8000/#/roadmap
            http://localhost:8000/#/faq
            http://localhost:8000/#/pricing
            http://localhost:8000/#/baa
            http://localhost:8000/#/dpa
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.github/lighthouse/lighthouserc.json

      # Sprint 32 P2 — axe-core a11y CI. Lighthouse a11y is a heuristic;
      # axe is rule-based and catches different violations. Both running
      # gives us coverage closer to a real WCAG 2.2 AA audit.
      - name: Install axe-core CLI
        run: npm install -g @axe-core/cli@4

      - name: axe a11y — landing
        # Audit 2026-06-21 / CI item 9: the `|| true` here was a
        # rubber-stamp that masked every violation. We now keep the
        # tolerant run (so the JSON artifact is always produced for
        # the team to triage in the next step), then a dedicated
        # gate fails the build when impact==critical violations
        # surface. Non-critical findings still upload but do not
        # block — gives the team a backlog without freezing PRs.
        run: |
          axe http://localhost:8000/ \
            --exit \
            --tags wcag2a,wcag2aa,wcag21aa,wcag22aa \
            --reporter v2 \
            --save axe-landing.json || true
          axe http://localhost:8000/#/roadmap \
            --exit \
            --tags wcag2a,wcag2aa,wcag21aa,wcag22aa \
            --reporter v2 \
            --save axe-roadmap.json || true

      - name: Fail on critical a11y violations
        # Parse each axe report and exit non-zero when any
        # violation carries impact == "critical". Pure node — no
        # extra dep, jq behaviour can vary by runner image.
        run: |
          node -e '
            const fs = require("fs");
            const files = ["axe-landing.json", "axe-roadmap.json"];
            let critical = 0;
            for (const f of files) {
              if (!fs.existsSync(f)) continue;
              const data = JSON.parse(fs.readFileSync(f, "utf8"));
              const runs = Array.isArray(data) ? data : [data];
              for (const r of runs) {
                for (const v of (r.violations || [])) {
                  if (v.impact === "critical") {
                    critical += 1;
                    console.log(`::error file=${f}::${v.id} (${v.help})`);
                  }
                }
              }
            }
            if (critical > 0) {
              console.error(`axe: ${critical} critical violation(s) — failing the build.`);
              process.exit(1);
            }
            console.log("axe: 0 critical violations.");
          '

      - name: Upload axe reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: axe-reports
          path: axe-*.json
          if-no-files-found: ignore
