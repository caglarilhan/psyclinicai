# PsyClinicAI strict analyzer rules - enterprise standard.
#
# Run: `flutter analyze` (CI enforces this on every PR).
#
# Policy: 0 errors + 0 warnings on owned code.
# `info` is tolerated as transitional debt (tracked in docs/runbooks/lint-cleanup.md).

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    invalid_assignment: error
    missing_required_param: error
    missing_return: error
    todo: ignore
    fixme: ignore
    deprecated_member_use: warning
    avoid_print: warning
  exclude:
    # Generated code
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.mocks.dart"
    - "build/**"
    - "lib/generated/**"
    # Legacy orphan refactor-in-progress (Sprint 7 cleanup target)
    - "lib/services/ai_marketplace_service.dart"
    - "lib/services/ai_model_marketplace_service.dart"
    - "lib/services/ai_model_training_service.dart"
    - "lib/services/quantum_ai_service.dart"
    - "lib/services/blockchain_security_service.dart"
    - "lib/services/advanced_ai_service.dart"
    - "lib/services/case_management_service.dart"
    - "lib/services/session_service.dart"
    - "lib/services/telehealth_service.dart"
    - "lib/services/supervisor_service.dart"
    - "lib/services/flag_system_service.dart"
    - "lib/services/ai_appointment_service.dart"
    - "lib/services/enterprise_tenant_service.dart"
    - "lib/services/flag_ai_service.dart"
    - "lib/services/final_integration_service.dart"
    - "lib/services/voice_analysis_service.dart"
    - "lib/services/facial_analysis_service.dart"
    - "lib/services/advanced_telemedicine_service.dart"
    - "lib/services/ai_training_service.dart"
    - "lib/services/ai_orchestration_service.dart"
    - "lib/services/predictive_analytics_service.dart"
    - "lib/services/us_state_law_service.dart"
    - "lib/widgets/flag/**"
    - "lib/widgets/ai_appointment/**"
    - "lib/widgets/session_ai/**"
    - "lib/widgets/ai_training/**"
    - "lib/widgets/ai_marketplace/**"
    - "lib/widgets/predictive_analytics/**"
    - "test/session_note_test.dart"
    - "test/quantum_ai_test.dart"

linter:
  rules:
    # Style / readability
    always_declare_return_types: true
    avoid_dynamic_calls: true
    avoid_empty_else: true
    avoid_function_literals_in_foreach_calls: true
    avoid_redundant_argument_values: true
    avoid_returning_null_for_void: true
    avoid_unused_constructor_parameters: true
    cast_nullable_to_non_nullable: true
    directives_ordering: true
    library_private_types_in_public_api: true
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    prefer_final_in_for_each: true
    prefer_final_locals: true
    prefer_single_quotes: true
    sort_constructors_first: true
    unawaited_futures: true
    unnecessary_lambdas: true
    use_super_parameters: true

    # Async / concurrency
    avoid_void_async: true
    discarded_futures: true

    # Error prevention
    avoid_catching_errors: true
    avoid_returning_null: true
    avoid_slow_async_io: true
    avoid_type_to_string: true
    no_adjacent_strings_in_list: true
    only_throw_errors: true
    test_types_in_equals: true
    throw_in_finally: true
    unnecessary_statements: true
    use_build_context_synchronously: true

    # Performance
    avoid_unnecessary_containers: true
    sized_box_for_whitespace: true
    use_decorated_box: true
    use_key_in_widget_constructors: true

    # Imports / dependencies
    depend_on_referenced_packages: true
    implementation_imports: true
    package_prefixed_library_names: true
