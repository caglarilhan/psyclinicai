name: psyclinicai
description: "A psychology clinic management application with AI integration"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  shared_preferences: ^2.2.2
  gap: ^3.0.1
  crypto: ^3.0.3
  # B6 (Sprint 8): DSAR encrypted ZIP export — bundle so PHI does
  # not have to leave the device through the clipboard.
  archive: ^3.6.1
  json_annotation: ^4.9.0
  provider: ^6.1.1
  # PDF Export için gerekli paketler
  pdf: ^3.10.7
  printing: ^5.11.1
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  permission_handler: ^11.3.1
  file_picker: ^10.3.3
  # Image handling için
  image: ^4.1.3
  # QR Code için
  qr_flutter: ^4.1.0
  # Push Notifications için
  flutter_local_notifications: ^16.3.2
  # firebase_messaging: ^14.7.20 # Geçici olarak devre dışı
  # Offline Database için
  sqflite: ^2.3.2
  path: ^1.9.0
  # Connectivity için
  connectivity_plus: ^5.0.2
  # Biometric Authentication için
  local_auth: ^2.1.8
  local_auth_android: ^1.0.38
  # Encryption için
  encrypt: ^5.0.3
  # Charts için
  fl_chart: ^0.66.2
  # AI Integration
  openai_dart: ^0.5.4
  anthropic_dart: ^1.0.1
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  # Perf audit 2026-06-21: google_fonts (~300 KB) had zero call sites
  # in lib/ — Inter is loaded via <link rel=stylesheet> in web/index.html
  # and bundled directly via system font on mobile. Dependency removed.
  # Material 3 animations
  animations: ^2.0.8
  # Calendar
  table_calendar: ^3.0.9
  # Teletherapy link açma
  url_launcher: ^6.3.0
  flutter_secure_storage: ^9.2.2
  sqflite_sqlcipher: ^3.3.0
  flutter_stripe: ^12.0.2
  flutter_webrtc: ^0.11.7
  google_mlkit_text_recognition: ^0.15.0
  speech_to_text: ^7.3.0
  image_picker: ^1.0.4

  intl: any
  # B17 (Sprint 8): localizations baseline — EN + TR ship today, the
  # remaining EU locales (DE/FR/NL/IT/ES) land once professional
  # translations clear PHQ-9 / GAD-7 / C-SSRS validation review.
  flutter_localizations:
    sdk: flutter
  timezone: any
  # Observability — Sentry crash + error capture. No-op until SENTRY_DSN
  # is provided via --dart-define (see lib/config/build_config.dart and
  # lib/services/data/telemetry_service.dart). Pinned to a major because
  # 9.x dropped legacy event format.
  sentry_flutter: ^8.10.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  json_serializable: ^6.7.1
  build_runner: ^2.4.7
  # Testing dependencies
  mockito: ^5.4.4
  test: ^1.24.9
  bloc_test: ^9.1.5
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  # Generates `lib/l10n/app_localizations.dart` from the .arb files
  # under `lib/l10n/`. See `l10n.yaml` at repo root.
  generate: true
  assets:
    - assets/
    - assets/guidelines/
    - assets/drugs/
    - assets/landing/
    - assets/branding/
