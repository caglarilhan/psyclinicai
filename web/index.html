  <!-- Content-Security-Policy intentionally absent until we land a
       Flutter-Web-tested baseline. The strict policy attempted in
       99aded0 blank-screened every route because connect-src missed the
       URLs Flutter uses at runtime (NOT just script load):
         - https://www.gstatic.com → CanvasKit .wasm fetched via Fetch API
         - https://fonts.gstatic.com → Roboto .woff2 fetched via Fetch API
       (link rel=stylesheet only covers font-src; the renderer itself
       Fetch()'s the binary, which connect-src governs.) Re-introduce
       CSP only with both gstatic origins in connect-src AND a
       Playwright SPA-boot check that fails closed if main.dart.js
       does not paint. The non-CSP headers below stay since they
       don't depend on Flutter's runtime. -->
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

  <script>
    // Sprint 27 / F-009 — register the patient-portal service worker
    // (web/sw.js) and unregister any legacy / Flutter-auto SW that
    // would otherwise sit alongside it. Legacy caches are dropped on
    // every page load so authenticated /portal/** responses cannot
    // survive across a kiosk session.
    (function () {
      if (!('serviceWorker' in navigator)) return;
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) {
          var url = (r.active && r.active.scriptURL) || '';
          if (url.indexOf('/sw.js') === -1) r.unregister();
        });
        navigator.serviceWorker.register('/sw.js', {scope: '/'}).catch(function (e) {
          console.warn('portal SW registration failed', e);
        });
      });
      if (window.caches) {
        caches.keys().then(function (ks) {
          ks.forEach(function (k) { caches.delete(k); });
        });
      }
    })();
  </script>
